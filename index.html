<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองคิวดูดวง:หมอวิทยา ธรรมนาย</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: left; }
        h2 { color: #1f2937; margin-bottom: 20px; font-size: 24px; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
        .form-group { margin-bottom: 16px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 16px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 16px; font-family: 'Sarabun', sans-serif; }
        
        .slots-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .slot-btn { flex: 1 1 calc(50% - 10px); padding: 10px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; font-family: 'Sarabun', sans-serif; transition: 0.2s; }
        .slot-available { background-color: #22c55e; color: white; cursor: pointer; }
        .slot-available:hover { background-color: #16a34a; }
        .slot-booked { background-color: #ef4444; color: white; cursor: not-allowed; }
        .slot-selected { background-color: #2563eb; color: white; box-shadow: 0 0 0 3px #bfdbfe; }

        .qr-section { text-align: center; margin: 20px 0; padding: 15px; background: #f9fafb; border-radius: 8px; border: 1px dashed #cbd5e1; }
        .qr-section img { max-width: 200px; border-radius: 8px; margin-bottom: 10px; }
        button[type="submit"] { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; font-family: 'Sarabun', sans-serif; }
        button[type="submit"]:hover { background: #1d4ed8; }
        button[type="submit"]:disabled { background: #9ca3af; cursor: not-allowed; }
        #statusMessage { margin-top: 15px; font-weight: bold; text-align: center; font-size: 16px; }
        .loading { font-size: 14px; color: #6b7280; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>จองคิวไพ่ : หมอวิทยา ธรรมนาย</h2>
    
    <form id="bookingForm">
        <div class="form-group">
            <label>ชื่อเจ้าชะตา:</label>
            <input type="text" id="name" placeholder="กรอกชื่อ-นามสกุล หรือ ชื่อเล่น" required>
        </div>

        <div class="form-group">
            <label>รูปแบบการดู:</label>
            <select id="type" onchange="handleTypeChange()" required>
                <option value="" disabled selected>-- เลือกรูปแบบ --</option>
                <option value="แบบระยะสั้น 12 ใบ (699 บาท)">แบบระยะสั้น 12 ใบ (60 นาที)</option>
                <option value="แบบประจำปี (1,099 บาท)">แบบประจำปี (60 นาที)</option>
                <option value="แบบละเอียด (1,999 บาท)">แบบละเอียด (120 นาที)</option>
            </select>
        </div>

        <div class="form-group">
            <label>วันที่ต้องการจอง:</label>
            <select id="dateSelect" onchange="renderSlots()" required disabled>
                <option value="" disabled selected>-- กำลังโหลดข้อมูล... --</option>
            </select>
        </div>

        <div class="form-group">
            <label>เลือกเวลา:</label>
            <div id="slotsContainer" class="slots-container">
                <div class="loading">กรุณาเลือกรูปแบบและวันที่เพื่อดูเวลาว่าง</div>
            </div>
            <input type="hidden" id="selectedStartTime" required>
            <input type="hidden" id="selectedEndTime">
        </div>

        <div class="qr-section">
            <p style="font-size: 16px; font-weight: bold; margin-top:0;">กรุณาสแกน QR Code เพื่อชำระค่าครู</p>
            <img src="qr_wt_pmy.jpg" alt="QR Code" onerror="this.style.display='none'">
            
            <div class="form-group" style="margin-top: 15px; text-align: left;">
                <label>แนบสลิปโอนเงิน (บังคับ):</label>
                <input type="file" id="slip" accept="image/*" required>
            </div>
        </div>

        <button type="submit" id="submitBtn">ยืนยันการจองคิว</button>
    </form>
    
    <div id="statusMessage"></div>
</div>

<script>
    // *** อย่าลืมวาง URL ของคุณตรงนี้นะครับ ***
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxoBDD-kQ9T_oJKEtdvk7hSiFlJ569GLev4f7_EejXtUYWspdPPyUcdA8zGJdYH7BHA/exec"; 
    
    let configData = [];
    let bookedData = [];

    function formatThaiDate(dateStr) {
        if (!dateStr) return '';
        let parts = dateStr.split('/');
        if (parts.length !== 3) return dateStr;
        
        let day = parseInt(parts[0], 10);
        let month = parseInt(parts[1], 10) - 1;
        let year = parseInt(parts[2], 10);
        
        let beYear = year < 2500 ? year + 543 : year; 
        let ceYear = year > 2500 ? year - 543 : year;
        let dateObj = new Date(ceYear, month, day);
        
        let thaiDays = ["วันอาทิตย์", "วันจันทร์", "วันอังคาร", "วันพุธ", "วันพฤหัสบดี", "วันศุกร์", "วันเสาร์"];
        let thaiMonths = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
        
        let dayName = thaiDays[dateObj.getDay()];
        let monthName = thaiMonths[month];
        
        return `${dayName} ที่ ${day} ${monthName} ${beYear}`;
    }

    window.onload = function() {
        fetch(WEB_APP_URL)
            .then(res => res.json())
            .then(data => {
                configData = data.availableDays;
                bookedData = data.bookedSlots;
                document.getElementById('dateSelect').innerHTML = `<option value="" disabled selected>-- กรุณาเลือกรูปแบบไพ่ด้านบนก่อน --</option>`;
            }).catch(err => {
                document.getElementById('dateSelect').innerHTML = `<option value="">โหลดข้อมูลไม่สำเร็จ กรุณารีเฟรช</option>`;
            });
    };

    function timeToMins(timeStr) {
        let parts = timeStr.split(':');
        return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    }

    function minsToTime(mins) {
        let h = Math.floor(mins / 60).toString().padStart(2, '0');
        let m = (mins % 60).toString().padStart(2, '0');
        return `${h}:${m}`;
    }

    function handleTypeChange() {
        const typeSelect = document.getElementById('type').value;
        const dateSelect = document.getElementById('dateSelect');
        const slotsDiv = document.getElementById('slotsContainer');
        
        slotsDiv.innerHTML = '<div class="loading">กรุณาเลือกรูปแบบและวันที่เพื่อดูเวลาว่าง</div>';
        document.getElementById('selectedStartTime').value = "";
        document.getElementById('selectedEndTime').value = "";

        if (!typeSelect || configData.length === 0) {
            dateSelect.disabled = true;
            return;
        }

        dateSelect.innerHTML = `<option value="" disabled selected>-- เลือกวันที่ --</option>`;
        
        let duration = 0; let buffer = 0;
        if (typeSelect.includes('แบบระยะสั้น') || typeSelect.includes('แบบประจำปี')) {
            duration = 60; buffer = 30;
        } else if (typeSelect.includes('แบบละเอียด')) {
            duration = 120; buffer = 40;
        }
        let totalBlock = duration + buffer;

        let hasAvailableDate = false;

        configData.forEach(day => {
            // จำกัดแบบละเอียด 2 คิวต่อวัน (เช็ค b.type เพื่อป้องกัน Error)
            if (typeSelect.includes('แบบละเอียด')) {
                const type3BookedCount = bookedData.filter(b => 
                    b.date === day.date && b.type && b.type.includes('แบบละเอียด')
                ).length;
                if (type3BookedCount >= 2) return; 
            }

            let startMins = timeToMins(day.start);
            let endMins = timeToMins(day.end);
            let hasAtLeastOneFreeSlot = false;

            for (let t = startMins; (t + duration) <= endMins; t += totalBlock) {
                let blockEndMins = t + totalBlock;
                let isBooked = false;

                for (let b of bookedData) {
                    if (b.date === day.date) {
                        let bStart = timeToMins(b.startTime);
                        let bEnd = timeToMins(b.endTime);
                        if (t < bEnd && blockEndMins > bStart) {
                            isBooked = true; break;
                        }
                    }
                }
                
                if (!isBooked) {
                    hasAtLeastOneFreeSlot = true;
                    break;
                }
            }

            if (hasAtLeastOneFreeSlot) {
                let option = document.createElement('option');
                option.value = day.date;
                option.text = formatThaiDate(day.date);
                dateSelect.appendChild(option);
                hasAvailableDate = true;
            }
        });

        if (!hasAvailableDate) {
            dateSelect.innerHTML = `<option value="" disabled selected>-- ไม่มีวันว่างสำหรับรูปแบบนี้ --</option>`;
            dateSelect.disabled = true;
        } else {
            dateSelect.disabled = false;
        }
    }

    function renderSlots() {
        const typeSelect = document.getElementById('type').value;
        const dateSelect = document.getElementById('dateSelect').value;
        const slotsDiv = document.getElementById('slotsContainer');
        
        document.getElementById('selectedStartTime').value = "";
        document.getElementById('selectedEndTime').value = "";

        if (!typeSelect || !dateSelect) return;

        slotsDiv.innerHTML = '';
        
        let duration = 0; let buffer = 0;
        if (typeSelect.includes('แบบระยะสั้น') || typeSelect.includes('แบบประจำปี')) {
            duration = 60; buffer = 30;
        } else if (typeSelect.includes('แบบละเอียด')) {
            duration = 120; buffer = 40;
        }
        let totalBlock = duration + buffer;

        let dayConf = configData.find(d => d.date === dateSelect);
        if(!dayConf) return;

        let startMins = timeToMins(dayConf.start);
        let endMins = timeToMins(dayConf.end);

        for (let t = startMins; (t + duration) <= endMins; t += totalBlock) {
            let slotStartStr = minsToTime(t);
            let slotEndStr = minsToTime(t + duration);
            let blockEndMins = t + totalBlock;

            let isBooked = false;
            for (let b of bookedData) {
                if (b.date === dateSelect) {
                    let bStart = timeToMins(b.startTime);
                    let bEnd = timeToMins(b.endTime);
                    if (t < bEnd && blockEndMins > bStart) {
                        isBooked = true; break;
                    }
                }
            }

            let btn = document.createElement('button');
            btn.type = 'button';
            
            if (isBooked) {
                btn.className = 'slot-btn slot-booked';
                btn.innerText = `${slotStartStr} - ${slotEndStr} (จองแล้ว)`;
                btn.disabled = true;
            } else {
                btn.className = 'slot-btn slot-available';
                btn.innerText = `${slotStartStr} - ${slotEndStr}`;
                btn.onclick = function() {
                    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('slot-selected'));
                    btn.classList.add('slot-selected');
                    document.getElementById('selectedStartTime').value = slotStartStr;
                    document.getElementById('selectedEndTime').value = minsToTime(blockEndMins);
                };
            }
            slotsDiv.appendChild(btn);
        }
    }

    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        if(!document.getElementById('selectedStartTime').value) {
            alert('กรุณากดเลือกเวลาที่ต้องการจองด้วยครับ (ปุ่มสีเขียว)'); return;
        }

        const fileInput = document.getElementById('slip');
        if (fileInput.files.length === 0) {
            alert('กรุณาแนบรูปสลิปโอนเงินครับ'); return;
        }

        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('statusMessage');
        btn.disabled = true;
        btn.innerText = "กำลังบันทึกข้อมูล กรุณารอสักครู่...";
        msg.innerText = "";

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(event) {
            const payload = {
                name: document.getElementById('name').value,
                type: document.getElementById('type').value,
                date: document.getElementById('dateSelect').value,
                startTime: document.getElementById('selectedStartTime').value,
                endTime: document.getElementById('selectedEndTime').value,
                base64: event.target.result,
                fileName: file.name
            };

            fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(data => {
                btn.disabled = false;
                btn.innerText = "ยืนยันการจองคิว";
                if(data.status === "success") {
                    msg.style.color = "green";
                    msg.innerText = "✅ จองคิวสำเร็จเรียบร้อยครับ";
                    document.getElementById('bookingForm').reset();
                    document.getElementById('slotsContainer').innerHTML = '<div class="loading">กรุณาเลือกรูปแบบและวันที่เพื่อดูเวลาว่าง</div>';
                    document.getElementById('dateSelect').innerHTML = `<option value="" disabled selected>-- กรุณาเลือกรูปแบบไพ่ด้านบนก่อน --</option>`;
                    document.getElementById('dateSelect').disabled = true;
                    window.onload(); 
                } else {
                    msg.style.color = "red";
                    msg.innerText = "❌ " + data.message;
                }
            })
            .catch(error => {
                btn.disabled = false;
                btn.innerText = "ยืนยันการจองคิว";
                msg.style.color = "red";
                msg.innerText = "เกิดข้อผิดพลาดในการส่งข้อมูลครับ";
            });
        };
        reader.readAsDataURL(file);
    });
</script>

</body>
</html>
